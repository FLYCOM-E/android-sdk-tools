name: build-android-sdk-tools

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Ref público do AOSP para compilar"
        required: true
        default: "main"
        type: string

      release_name:
        description: "Nome exibido na release"
        required: true
        default: "36.0.1"
        type: string

      ndk_version:
        description: "Versão do NDK"
        required: false
        default: "r26d"
        type: string

      abi:
        description: "ABI de compilação"
        required: false
        default: "arm64-v8a"
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64

permissions:
  contents: write

jobs:
  build-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git python3 python3-pip cmake ninja-build \
            bison flex unzip zip wget

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Download Android NDK
        run: |
          mkdir -p "$HOME/android"
          cd "$HOME/android"
          wget -q "https://dl.google.com/android/repository/android-ndk-${{ inputs.ndk_version }}-linux.zip"
          unzip -q "android-ndk-${{ inputs.ndk_version }}-linux.zip"
          echo "NDK_HOME=$HOME/android/android-ndk-${{ inputs.ndk_version }}" >> "$GITHUB_ENV"

      - name: Fetch sources
        run: |
          python3 get_source.py --tags "${{ inputs.source_ref }}"

      - name: Build host protoc
        run: |
          cd src/protobuf
          mkdir -p build
          cd build
          cmake -GNinja -Dprotobuf_BUILD_TESTS=OFF ..
          ninja -j"$(nproc)"

      - name: Build SDK tools
        run: |
          python3 build.py \
            --ndk="$NDK_HOME" \
            --abi="${{ inputs.abi }}" \
            --build="build/${{ inputs.abi }}" \
            --protoc="$GITHUB_WORKSPACE/src/protobuf/build/protoc" \
            --job="$(nproc)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-sdk-tools-${{ inputs.release_name }}-${{ inputs.abi }}
          path: build/**/android-sdk-tools-*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sdk-${{ inputs.release_name }}-${{ github.run_number }}
          name: ${{ inputs.release_name }}
          files: build/**/android-sdk-tools-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
